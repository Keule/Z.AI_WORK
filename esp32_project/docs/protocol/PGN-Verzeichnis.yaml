schema_version: 1
protocol:
  name: aog_udp_pgn
  frame:
    byte_0: {name: header_0, const_hex: "0x80"}
    byte_1: {name: header_1, const_hex: "0x81"}
    byte_2: {name: source, type: uint8, common_values_hex: ["0x7F", "0x7C"]}
    byte_3: {name: pgn_id, type: uint8}
    byte_4: {name: payload_length, type: uint8}
    byte_5_to_n_minus_1: {name: payload, type: bytes}
    byte_n: {name: crc, type: uint8, calc: "sum(bytes[2..n-1]) mod 256"}
  endianness_default: little_endian

sources:
  - {source_dec: 127, source_hex: "0x7F", name: aog_app_source, typical_use: "standard AOG PGN source"}
  - {source_dec: 124, source_hex: "0x7C", name: agio_nmea_translator_source, typical_use: "NMEA/GPS translation frames"}
  - {source_dec: 126, source_hex: "0x7E", name: autosteer_module_id, typical_use: "hello/scan/module replies"}
  - {source_dec: 123, source_hex: "0x7B", name: machine_module_id, typical_use: "hello/scan/module replies"}
  - {source_dec: 121, source_hex: "0x79", name: imu_module_id, typical_use: "hello/scan"}
  - {source_dec: 120, source_hex: "0x78", name: gps_module_id, typical_use: "scan reply module type"}

transport_endpoints:
  - {node: aog_app, ip: "127.0.0.1", listen_udp: 15555, send_to: "127.255.255.255:17777", note: "loopback PGN socket"}
  - {node: agio_loopback, ip: "127.0.0.1", listen_udp: 17777, send_to: "127.0.0.1:15555", note: "bridge to AOG"}
  - {node: agio_udp_network, ip: "0.0.0.0", listen_udp: 9999, send_to: "x.x.x.255:8888", note: "module subnet broadcast"}
  - {node: modules, ip: "module-assigned", listen_udp: 8888, send_to: "AgIO:9999", note: "autosteer/machine/imu/gps modules"}

pgn_routes:
  - {pgn_or_id: "0xD6", dec: 214, flow: "AgIO->AOG", path: "127.0.0.1:17777 -> 127.0.0.1:15555"}
  - {pgn_or_id: "0xD3,0xD4,0xFD,0xFA,0xEA,0xDD,0xDE,0xF0", flow: "modules_or_tc->AOG", path: "module network -> AgIO:9999 -> loopback:15555"}
  - {pgn_or_id: "0xFE,0xFC,0xFB,0xEF,0xEE,0xEC,0xEB,0xE5,0xE4,0xF1..0xF3", flow: "AOG->modules_or_tc", path: "AOG:15555 -> AgIO:17777 -> subnet broadcast:8888"}
  - {pgn_or_id: "0x64", dec: 100, flow: "AOG->local consumers", path: "loopback local delivery (incl. GPS_Out)"}
  - {pgn_or_id: "121,123,126,203", flow: "module service signaling", path: "modules:8888 <-> AgIO:9999"}

special_cases:
  - pgn_dec: 214
    rules:
      - "Sentinel invalid markers used: double.MaxValue/float.MaxValue/ushort.MaxValue/short.MaxValue."
      - "Roll reset special marker: float.MinValue -> roll=0."
      - "Receiver applies update throttling via udpWatchLimit (drops too-fast packets)."
  - pgn_dec: 211
    rules:
      - "Process only when full message length is 14 bytes."
  - pgn_dec: 212
    rules:
      - "Disconnect handling only when payload byte5 == 1."
  - pgn_dec: 253
    rules:
      - "Process only when full message length is 14 bytes."
      - "heading=9999 and roll=8888 are N/A sentinels."
  - pgn_dec: 250
    rules:
      - "Process only when full message length is 14 bytes."
  - pgn_dec: 221
    rules:
      - "Rendered only when hardware message display is enabled; otherwise hidden."
  - pgn_dec: 222
    rules:
      - "Commands executed only when corresponding mask bits are set."
  - pgn_dec: 234
    rules:
      - "Process only when full message length is 14 bytes."
  - pgn_dec: 240
    rules:
      - "Variable payload; heartbeat decode expects minimum 2 payload bytes."
  - pgn_dec: 100
    rules:
      - "Two payload variants: 16-byte and 24-byte."
      - "fix2fix_heading present only in 24-byte variant."
      - "GPS_Out treats stream as connected only if latest frame age < 4 seconds."

pgns:
  - pgn_dec: 214
    pgn_hex: "0xD6"
    name: gps_position
    direction: agio_to_aog
    payload_length: 52
    fields:
      - {name: longitude, byte_start: 5, byte_end: 12, type: float64, bytes: 8, endian: le, scale: 1.0, unit: deg, invalid: "double.MaxValue"}
      - {name: latitude, byte_start: 13, byte_end: 20, type: float64, bytes: 8, endian: le, scale: 1.0, unit: deg, invalid: "double.MaxValue"}
      - {name: heading_dual, byte_start: 21, byte_end: 24, type: float32, bytes: 4, endian: le, scale: 1.0, unit: deg, invalid: "float.MaxValue"}
      - {name: heading_true, byte_start: 25, byte_end: 28, type: float32, bytes: 4, endian: le, scale: 1.0, unit: deg}
      - {name: speed, byte_start: 29, byte_end: 32, type: float32, bytes: 4, endian: le, scale: 1.0, unit: "context-dependent"}
      - {name: roll, byte_start: 33, byte_end: 36, type: float32, bytes: 4, endian: le, scale: 1.0, unit: deg, reset_value: "float.MinValue"}
      - {name: altitude, byte_start: 37, byte_end: 40, type: float32, bytes: 4, endian: le, scale: 1.0, unit: m}
      - {name: satellites, byte_start: 41, byte_end: 42, type: uint16, bytes: 2, endian: le, scale: 1.0, unit: count, invalid: "ushort.MaxValue"}
      - {name: fix_quality, byte_start: 43, byte_end: 43, type: uint8, bytes: 1, scale: 1.0, unit: code, invalid: "byte.MaxValue"}
      - {name: hdop, byte_start: 44, byte_end: 45, type: uint16, bytes: 2, endian: le, scale: 0.01, unit: ratio, invalid: "ushort.MaxValue"}
      - {name: age, byte_start: 46, byte_end: 47, type: uint16, bytes: 2, endian: le, scale: 0.01, unit: s, invalid: "ushort.MaxValue"}
      - {name: imu_heading, byte_start: 48, byte_end: 49, type: uint16, bytes: 2, endian: le, scale: 0.1, unit: deg, invalid: "ushort.MaxValue"}
      - {name: imu_roll, byte_start: 50, byte_end: 51, type: int16, bytes: 2, endian: le, scale: 0.1, unit: deg, invalid: "short.MaxValue"}
      - {name: imu_pitch, byte_start: 52, byte_end: 53, type: int16, bytes: 2, endian: le, scale: 1.0, unit: raw, invalid: "short.MaxValue"}
      - {name: imu_yaw_rate, byte_start: 54, byte_end: 55, type: int16, bytes: 2, endian: le, scale: 1.0, unit: raw, invalid: "short.MaxValue"}

  - pgn_dec: 211
    pgn_hex: "0xD3"
    name: external_imu
    direction: module_to_aog
    payload_length: 8
    fields:
      - {name: heading, byte_start: 5, byte_end: 6, type: int16, bytes: 2, endian: le, scale: 0.1, unit: deg}
      - {name: roll, byte_start: 7, byte_end: 8, type: int16, bytes: 2, endian: le, scale: 0.1, unit: deg}
      - {name: angular_velocity, byte_start: 9, byte_end: 10, type: int16, bytes: 2, endian: le, scale: -0.5, unit: raw}

  - pgn_dec: 212
    pgn_hex: "0xD4"
    name: imu_disconnect
    direction: module_to_aog
    payload_length: 1
    fields:
      - {name: disconnect, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, semantics: "1=disconnected"}

  - pgn_dec: 253
    pgn_hex: "0xFD"
    name: steer_module_response
    direction: module_to_aog
    payload_length: 8
    fields:
      - {name: actual_steer_angle, byte_start: 5, byte_end: 6, type: int16, bytes: 2, endian: le, scale: 0.01, unit: deg}
      - {name: heading, byte_start: 7, byte_end: 8, type: int16, bytes: 2, endian: le, scale: 0.1, unit: deg, invalid: 9999}
      - {name: roll, byte_start: 9, byte_end: 10, type: int16, bytes: 2, endian: le, scale: 0.1, unit: deg, invalid: 8888}
      - {name: switch_status, byte_start: 11, byte_end: 11, type: uint8, bytes: 1, bitfield: {bit0: work_switch, bit1: steer_switch}}
      - {name: pwm_actual, byte_start: 12, byte_end: 12, type: uint8, bytes: 1, unit: raw}

  - pgn_dec: 250
    pgn_hex: "0xFA"
    name: sensor_data
    direction: module_to_aog
    payload_length: 1
    fields:
      - {name: sensor_data, byte_start: 5, byte_end: 5, type: uint8, bytes: 1}

  - pgn_dec: 234
    pgn_hex: "0xEA"
    name: remote_switches
    direction: module_to_aog
    payload_length: 8
    fields:
      - {name: switch_data, byte_start: 5, byte_end: 12, type: byte_array, bytes: 8}

  - pgn_dec: 221
    pgn_hex: "0xDD"
    name: display_message
    direction: module_to_aog
    payload_length: variable
    fields:
      - {name: display_time, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, unit: s}
      - {name: color, byte_start: 6, byte_end: 6, type: uint8, bytes: 1, semantics: "0=salmon, else=bisque"}
      - {name: message_utf8, byte_start: 7, byte_end: variable, type: utf8_string, bytes: variable}

  - pgn_dec: 222
    pgn_hex: "0xDE"
    name: remote_commands
    direction: module_to_aog
    payload_length: 2
    fields:
      - {name: mask, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, bitfield: {bit0: nudge_valid, bit1: cycle_valid}}
      - {name: command, byte_start: 6, byte_end: 6, type: uint8, bytes: 1, bitfield: {bit0: direction}}

  - pgn_dec: 240
    pgn_hex: "0xF0"
    name: isobus_heartbeat
    direction: tc_to_aog
    payload_length: variable
    fields:
      - {name: status, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, bitfield: {bit0: section_control_enabled, bits1_3: num_clients}}
      - {name: number_of_sections, byte_start: 6, byte_end: 6, type: uint8, bytes: 1}
      - {name: section_states, byte_start: 7, byte_end: variable, type: bitmask_array, bytes: variable}

  - pgn_dec: 241
    pgn_hex: "0xF1"
    name: isobus_enable_request
    direction: aog_to_tc
    payload_length: 1
    fields:
      - {name: enabled, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, semantics: "1=enable,0=disable"}

  - pgn_dec: 242
    pgn_hex: "0xF2"
    name: isobus_process_data
    direction: aog_to_tc
    payload_length: 6
    fields:
      - {name: identifier, byte_start: 5, byte_end: 6, type: uint16, bytes: 2, endian: le}
      - {name: value, byte_start: 7, byte_end: 10, type: int32, bytes: 4, endian: le}

  - pgn_dec: 243
    pgn_hex: "0xF3"
    name: isobus_field_name
    direction: aog_to_tc
    payload_length: variable
    fields:
      - {name: name_length, byte_start: 4, byte_end: 4, type: uint8, bytes: 1, min: 0, max: 248}
      - {name: field_name, byte_start: 5, byte_end: variable, type: utf8_string, bytes: variable}

  - pgn_dec: 208
    pgn_hex: "0xD0"
    name: lat_lon_compact
    direction: aog_to_module
    payload_length: 8
    fields:
      - {name: latitude_encoded, byte_start: 5, byte_end: 8, type: int32, bytes: 4, endian: le, decode: "lat = encoded / (0x7FFFFFFF/90.0)", unit: deg}
      - {name: longitude_encoded, byte_start: 9, byte_end: 12, type: int32, bytes: 4, endian: le, decode: "lon = encoded / (0x7FFFFFFF/180.0)", unit: deg}

  - pgn_dec: 100
    pgn_hex: "0x64"
    name: corrected_position
    direction: aog_to_loop_or_gps_out
    payload_length: [16, 24]
    fields:
      - {name: longitude, byte_start: 5, byte_end: 12, type: float64, bytes: 8, endian: le, unit: deg}
      - {name: latitude, byte_start: 13, byte_end: 20, type: float64, bytes: 8, endian: le, unit: deg}
      - {name: fix2fix_heading, byte_start: 21, byte_end: 28, type: float64, bytes: 8, endian: le, unit: deg, present_when_payload_length: 24}

  - pgn_dec: 254
    pgn_hex: "0xFE"
    name: autosteer_data
    direction: aog_to_module
    payload_length: 8
    fields:
      - {name: speed_lo, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, significance: lsb}
      - {name: speed_hi, byte_start: 6, byte_end: 6, type: uint8, bytes: 1, significance: msb}
      - {name: status, byte_start: 7, byte_end: 7, type: uint8, bytes: 1}
      - {name: steer_angle_lo, byte_start: 8, byte_end: 8, type: uint8, bytes: 1, significance: lsb}
      - {name: steer_angle_hi, byte_start: 9, byte_end: 9, type: uint8, bytes: 1, significance: msb}
      - {name: line_distance, byte_start: 10, byte_end: 10, type: uint8, bytes: 1}
      - {name: sc_1_8, byte_start: 11, byte_end: 11, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_9_16, byte_start: 12, byte_end: 12, type: uint8, bytes: 1, bitmask: true}

  - pgn_dec: 252
    pgn_hex: "0xFC"
    name: autosteer_settings
    direction: aog_to_module
    payload_length: 8
    fields:
      - {name: gain_proportional, byte_start: 5, byte_end: 5, type: uint8, bytes: 1}
      - {name: high_pwm, byte_start: 6, byte_end: 6, type: uint8, bytes: 1}
      - {name: low_pwm, byte_start: 7, byte_end: 7, type: uint8, bytes: 1}
      - {name: min_pwm, byte_start: 8, byte_end: 8, type: uint8, bytes: 1}
      - {name: counts_per_degree, byte_start: 9, byte_end: 9, type: uint8, bytes: 1}
      - {name: was_offset_lo, byte_start: 10, byte_end: 10, type: uint8, bytes: 1, significance: lsb}
      - {name: was_offset_hi, byte_start: 11, byte_end: 11, type: uint8, bytes: 1, significance: msb}
      - {name: ackerman, byte_start: 12, byte_end: 12, type: uint8, bytes: 1}

  - pgn_dec: 251
    pgn_hex: "0xFB"
    name: autosteer_config
    direction: aog_to_module
    payload_length: 8
    fields:
      - {name: set0, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, description: "primary config bitfield", bitfield: {bit0: invert_was, bit1: invert_relays, bit2: invert_steer, bit3: steer_type_single_vs_diff, bit4: motor_driver_cytron_vs_ibt2, bit5: steer_enable_switch, bit6: steer_enable_button, bit7: encoder_enabled}}
      - {name: max_pulse, byte_start: 6, byte_end: 6, type: uint8, bytes: 1, description: "max pulse / sensor threshold"}
      - {name: min_speed, byte_start: 7, byte_end: 7, type: uint8, bytes: 1, scale: 0.1, unit: "km/h", description: "minimum speed for autosteer"}
      - {name: set1, byte_start: 8, byte_end: 8, type: uint8, bytes: 1, description: "secondary config bitfield", bitfield: {bit0: danfoss_mode, bit1: pressure_sensor, bit2: current_sensor, bit3: axis_y_instead_of_x}}
      - {name: ang_vel, byte_start: 9, byte_end: 9, type: uint8, bytes: 1, semantics: "1=constant contour mode on, 0=off"}

  - pgn_dec: 239
    pgn_hex: "0xEF"
    name: machine_data
    direction: aog_to_module
    payload_length: 8
    fields:
      - {name: uturn, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, semantics: "0=inactive,1=active"}
      - {name: speed, byte_start: 6, byte_end: 6, type: uint8, bytes: 1, scale: 0.1, unit: "km/h"}
      - {name: hyd_lift, byte_start: 7, byte_end: 7, type: uint8, bytes: 1, semantics: "0=neutral/off,1=lower,2=raise"}
      - {name: tram, byte_start: 8, byte_end: 8, type: uint8, bytes: 1, bitfield: {bit0: tram_right, bit1: tram_left}}
      - {name: geo_stop, byte_start: 9, byte_end: 9, type: uint8, bytes: 1, semantics: "1=out_of_bounds_geostop"}
      - {name: sc_1_8, byte_start: 11, byte_end: 11, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_9_16, byte_start: 12, byte_end: 12, type: uint8, bytes: 1, bitmask: true}

  - pgn_dec: 238
    pgn_hex: "0xEE"
    name: machine_config
    direction: aog_to_module
    payload_length: 8
    fields:
      - {name: raise_time, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, unit: "s_module_timebase"}
      - {name: lower_time, byte_start: 6, byte_end: 6, type: uint8, bytes: 1, unit: "s_module_timebase"}
      - {name: enable_hyd, byte_start: 7, byte_end: 7, type: uint8, bytes: 1, description: "legacy field; hydraulic enable is actively controlled via set0 bit1"}
      - {name: set0, byte_start: 8, byte_end: 8, type: uint8, bytes: 1, bitfield: {bit0: invert_machine_relays, bit1: hydraulic_enabled}}
      - {name: user1, byte_start: 9, byte_end: 9, type: uint8, bytes: 1, description: "user-defined parameter 1"}
      - {name: user2, byte_start: 10, byte_end: 10, type: uint8, bytes: 1, description: "user-defined parameter 2"}
      - {name: user3, byte_start: 11, byte_end: 11, type: uint8, bytes: 1, description: "user-defined parameter 3"}
      - {name: user4, byte_start: 12, byte_end: 12, type: uint8, bytes: 1, description: "user-defined parameter 4"}

  - pgn_dec: 236
    pgn_hex: "0xEC"
    name: relay_config
    direction: aog_to_module
    payload_length: 24
    fields:
      - {name: pins_0_23, byte_start: 5, byte_end: 28, type: uint8_array, bytes: 24}

  - pgn_dec: 235
    pgn_hex: "0xEB"
    name: section_dimensions
    direction: aog_to_module
    payload_length: 33
    fields:
      - {name: section_widths_0_15, byte_start: 5, byte_end: 36, type: uint16_array, bytes: 32, endian: le, count: 16, scaling_hint: "width*100"}
      - {name: number_of_sections, byte_start: 37, byte_end: 37, type: uint8, bytes: 1}

  - pgn_dec: 229
    pgn_hex: "0xE5"
    name: section_control_extended
    direction: aog_to_module
    payload_length: 10
    fields:
      - {name: sc_1_8, byte_start: 5, byte_end: 5, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_9_16, byte_start: 6, byte_end: 6, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_17_24, byte_start: 7, byte_end: 7, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_25_32, byte_start: 8, byte_end: 8, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_33_40, byte_start: 9, byte_end: 9, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_41_48, byte_start: 10, byte_end: 10, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_49_56, byte_start: 11, byte_end: 11, type: uint8, bytes: 1, bitmask: true}
      - {name: sc_57_64, byte_start: 12, byte_end: 12, type: uint8, bytes: 1, bitmask: true}
      - {name: tool_left_speed, byte_start: 13, byte_end: 13, type: uint8, bytes: 1}
      - {name: tool_right_speed, byte_start: 14, byte_end: 14, type: uint8, bytes: 1}

  - pgn_dec: 228
    pgn_hex: "0xE4"
    name: rate_control
    direction: aog_to_module
    payload_length: 8
    fields:
      - {name: rate0, byte_start: 5, byte_end: 5, type: uint8, bytes: 1}
      - {name: rate1, byte_start: 6, byte_end: 6, type: uint8, bytes: 1}
      - {name: rate2, byte_start: 7, byte_end: 7, type: uint8, bytes: 1}

service_ids_same_channel:
  - id_dec: 126
    name: hello_autosteer_module
    frame_length: 11
    direction: module_to_agio
    fields:
      - {name: source, byte: 2, type: uint8, semantics: "module id"}
      - {name: actual_steer_angle, byte_start: 5, byte_end: 6, type: int16, endian: le, scale: 0.01, unit: deg}
      - {name: was_counts, byte_start: 7, byte_end: 8, type: int16, endian: le, unit: counts}
      - {name: switch_status, byte: 9, type: uint8, bitfield: {bit0: work_switch, bit1: steer_switch}}
  - id_dec: 123
    name: hello_machine_module
    frame_length: 11
    direction: module_to_agio
    fields:
      - {name: source, byte: 2, type: uint8, semantics: "module id"}
      - {name: sections_1_8, byte: 5, type: uint8, bitmask: true}
      - {name: sections_9_16, byte: 6, type: uint8, bitmask: true}
  - id_dec: 121
    name: hello_imu_module
    frame_length: 11
    direction: module_to_agio
    fields:
      - {name: source, byte: 2, type: uint8, semantics: "module id"}
    note: "Used as alive/ping signal; no additional payload fields are consumed in AgIO path."
  - id_dec: 203
    name: scan_reply
    frame_length: 13
    direction: module_to_agio
    fields:
      - {name: module_type, byte: 2, type: uint8, map: {126: steer, 123: machine, 121: imu, 120: gps}}
      - {name: module_ip, byte_start: 5, byte_end: 8, type: uint8_array, bytes: 4}
      - {name: subnet_prefix, byte_start: 9, byte_end: 11, type: uint8_array, bytes: 3}

gps_out_transport_ids:
  - {name: outer_pgn, value_dec: 33152, value_hex: "0x8180", compose: "Data[1]<<8 | Data[0]"}
  - {name: subpgn_agio_nmea_translation, value_dec: 54908, value_hex: "0xD67C", compose: "Data[3]<<8 | Data[2]"}
  - {name: subpgn_corrected_position, value_dec: 25727, value_hex: "0x647F", compose: "Data[3]<<8 | Data[2]"}
